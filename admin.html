<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dünya Kupası Arena · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head>
<body>

<header class="hdr" id="hdr">
  <div class="c hdr-i">
    <a href="index.html" class="logo" >
      <span class="logo-icon">⚽</span>
      <span class="logo-txt">
        <span class="logo-sub">Dünya Kupası</span>
        <span class="logo-main">Arena</span>
      </span>
    </a>
    <nav class="nav">
      <a href="index.html">Ana Sayfa</a>
      <a href="predictions.html">Tahminler</a>
      <a href="rankings.html">Sıralama</a>
      <a href="rules.html">Kurallar</a>
      <a href="index.html" class="btn btn-p">Siteye Dön</a>
    </nav>
    <button class="hbg" id="hbg" aria-label="Menüyü aç/kapat"><span></span><span></span><span></span></button>
  </div>
  <nav class="mob-nav" id="mobnav">
    <a href="index.html">Ana Sayfa</a>
    <a href="predictions.html">Tahminler</a>
    <a href="rankings.html">Sıralama</a>
    <a href="rules.html">Kurallar</a>
    <a href="index.html" class="btn btn-p">Siteye Dön</a>
  </nav>
</header>

<main data-page="admin">
<section class="s" id="admin">
  <div class="c">
    <p class="slabel">Admin</p>
    <h2 class="stitle">Maç Sonuçları</h2>
    <div class="divider"></div>

    <div id="adminAccessMessage" class="rank-panel" style="padding:18px;margin-top:24px" hidden></div>
    <div id="adminDebug" class="rank-panel" style="padding:14px;margin-top:14px;font-size:13px;color:var(--t2);white-space:pre-wrap" hidden></div>

    <div id="adminLoginPanel" class="rank-panel feat" style="padding:22px;margin-top:34px;max-width:520px">
      <p class="slabel">Admin Giriş</p>
      <h3 class="hc-t">Admin Giriş</h3>
      <form id="adminLoginForm" style="display:flex;flex-direction:column;gap:12px;margin-top:18px">
        <label style="display:flex;flex-direction:column;gap:7px"><span class="hc-d">E-posta</span><input id="adminEmail" type="email" required placeholder="admin@ornek.com" style="padding:13px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--t1)"></label>
        <label style="display:flex;flex-direction:column;gap:7px"><span class="hc-d">Şifre</span><input id="adminPassword" type="password" required placeholder="Şifre" style="padding:13px;border-radius:8px;border:1px solid var(--border);background:var(--bg-raised);color:var(--t1)"></label>
        <button class="btn btn-p" id="adminLoginButton" type="submit">Admin Girişi Yap</button>
        <a href="index.html" class="btn btn-o" style="align-self:flex-start">Siteye Dön</a>
      </form>
    </div>

    <div id="adminPanel" hidden>
      <div id="adminMatchesList" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:34px"></div>
    </div>
  </div>
</section>
</main>

<footer><div class="c">© 2026 World Cup Arena · Tüm Hakları Saklıdır</div></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
</body>
</html>
